apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontendlab
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontendlab
  template:
    metadata:
      labels:
        app: frontendlab
    spec:
      containers:
        - name: frontendlab
          image: miadi/my-frontend:1.3
          ports:
            - containerPort: 8080
          env:
            - name: API_URL
              value: "http://backendlab:3000"

---
apiVersion: v1
kind: Service
metadata:
  name: frontendlab
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontendlab
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
      nodePort: 30080
