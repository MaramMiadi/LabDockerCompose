apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontendlab
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontendlab
  template:
    metadata:
      labels:
        app: frontendlab
    spec:
      containers:
        - name: frontendlab
          image: miadi/my-frontend:1.2
          ports:
            - containerPort: 80
          env:
            - name: API_URL
              value: "http://backendlab:3000"

---
apiVersion: v1
kind: Service
metadata:
  name: frontendlab
  namespace: default
spec:
  type: NodePort
  selector:
    app: frontendlab
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
      nodePort: 30080
